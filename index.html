<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarthaBox | Short News</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; color: white;}
        
        /* The swiping container */
        #news-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        
        /* Language Bar floating at top */
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;}
        .brand { font-size: 1.5em; font-weight: 900; color: #ff3f34; letter-spacing: 1px;}
        .lang-selector { display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; cursor: pointer; backdrop-filter: blur(5px);}
        .lang-btn.active { background: #ff3f34; font-weight: bold;}

        /* Individual News Card */
        .article { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; flex-direction: column; position: relative;}
        
        .article-img { width: 100%; height: 45vh; object-fit: cover; background: #222;}
        
        .content-box { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; background: #111;}
        .category-tag { background: #ff3f34; color: white; display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; width: max-content;}
        .article h2 { margin: 0 0 10px 0; font-size: 1.4em; line-height: 1.3; font-weight: 600; }
        .article p { margin: 0 0 15px 0; font-size: 1.1em; line-height: 1.5; color: #ccc; }
        
        .footer { margin-top: auto; padding-bottom: 30px; font-size: 0.8em; color: #888; }
        .footer a { color: #0fb9b1; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">VarthaBox</div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div id="news-container">
        <div style="height: 100vh; display: flex; justify-content: center; align-items: center;">
            <h2>Loading VarthaBox...</h2>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];

        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) {
                container.innerHTML = "<div style='height: 100vh; display: flex; justify-content: center; align-items: center; text-align:center; padding:20px;'><h2>AI is writing the latest updates.<br>Check back in a few minutes!</h2></div>";
                return;
            }

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                const articleHTML = `
                    <div class="article">
                        <img class="article-img" src="${article.image}" alt="News Image" onerror="this.src='https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=800&q=80'">
                        <div class="content-box">
                            <div class="category-tag">${article.category}</div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            <div class="footer">
                                Swipe up for next article &bull; <a href="${article.link}" target="_blank">Tap to read full story</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                newsData = data;
                renderNews();
            })
            .catch(error => console.error('Error fetching news:', error));
    </script>
</body>
</html>
