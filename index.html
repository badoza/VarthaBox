<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarthaBox | Premium Short News</title>
    <style>
        /* MINIMALIST PREMIUM MOBILE CSS */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; color: white;}
        
        /* Glassmorphism Header Bar (transparent blurry header like Apple uses) */
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px; background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box;}
        .brand { font-size: 1.4em; font-weight: 800; color: white; letter-spacing: 0.5px;}
        .brand span { color: #ff3f34; } /* ACCENT RED matched to logo */
        
        .lang-selector { display: flex; gap: 5px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: none; color: #aaa; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; cursor: pointer; transition: 0.3s;}
        .lang-btn.active { background: #ff3f34; color: white; font-weight: bold;} /* Matched to logo color */

        /* Swiping container (News items snap to full screen) */
        #news-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth;}
        
        /* Free Live Score Ticker Bar (CORS Proxy used to fetch data for free) */
        .score-ticker { background: #ff3f34; color: white; padding: 3px 15px; font-size: 0.8em; font-weight: bold; position: fixed; bottom: 0; left: 0; width: 100%; z-index: 100; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;}

        /* Individual News Card */
        .article { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; flex-direction: column; position: relative; box-sizing: border-box; padding-top: 60px;}
        
        .article-img-container { padding: 10px; height: 40vh; }
        .article-img { width: 100%; height: 100%; object-fit: cover; border-radius: 15px; background: #222; box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
        
        .content-box { padding: 25px 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start;}
        .category-tag { color: #ff3f34; font-size: 0.75em; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;}
        .article h2 { margin: 0 0 10px 0; font-size: 1.4em; line-height: 1.3; font-weight: 600; color: white; }
        .article p { margin: 0 0 15px 0; font-size: 1.05em; line-height: 1.5; color: #bbb; font-weight: 400; }
        
        /* Native Share & Voice action row (buttons at the bottom) */
        .action-row { display: flex; gap: 10px; margin-top: auto; padding-bottom: 40px;}
        .action-btn { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 15px; border-radius: 12px; font-weight: 600; font-size: 0.9em; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .action-btn.share { background: #ff3f34; color: white; } /* Matched to logo */
        .action-btn.share span { font-size: 1.2em; }
        
        /* Read more link at bottom */
        .read-more-link { text-align: center; font-size: 0.8em; color: #555; text-decoration: none; padding-bottom: 30px;}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">Vartha<span>Box</span></div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div id="news-container">
        <div style="height: 100vh; display: flex; justify-content: center; align-items: center; color: #555;">Loading premium feed...</div>
    </div>
    
    <div class="score-ticker" id="cricket-score">
        🏏 LIVE SCORE: Loading latest matches...
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];
        const synth = window.speechSynthesis; // Mobile native voice engine (fixed delay)

        // Language map for voice synthesis on phone
        const langVoiceMap = { 'en': 'en-IN', 'kn': 'kn-IN', 'mr': 'mr-IN', 'hi': 'hi-IN' };

        // --- 1. LANGUAGE & SWIPE LOGIC ---
        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            synth.cancel(); // Stop speaking if language changes
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) return;

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                // Construct premium news card
                const articleHTML = `
                    <div class="article" id="${article.id}">
                        <div class="article-img-container">
                            <img class="article-img" src="${article.image}" alt="News Image" onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&q=80'">
                        </div>
                        <div class="content-box">
                            <div class="category-tag">${article.category}</div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            
                            <div class="action-row">
                                <button class="action-btn" onclick="readAloud('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    <span>🔊</span> Listen
                                </button>
                                <button class="action-btn share" onclick="shareArticle('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    <span>🚀</span> Share
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });

            // --- 2. DEEP LINK MAGIC ---
            // If user clicks shared link (e.g., app.com/#article_id), scroll instantly to it
            const sharedArticleId = window.location.hash.substring(1);
            if (sharedArticleId) {
                setTimeout(() => {
                    const sharedElement = document.getElementById(sharedArticleId);
                    if (sharedElement) {
                        sharedElement.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 800); // Slight delay for rendering
            }
        }

        // --- 3. FREE AI VOICE READER (Uses phone's native speech synthesis, fixed delay) ---
        function readAloud(articleId, title, content) {
            synth.cancel(); // Cancel any existing speech
            
            const utterance = new SpeechSynthesisUtterance(`${title}. ${content}`);
            utterance.lang = langVoiceMap[currentLang]; // Set language
            utterance.rate = 0.95; // Slightly slower news rate
            synth.speak(utterance);
        }

        // --- 4. CREATIVE DEEP-LINK SHARING (Uses native phone share menu, fixed delay) ---
        function shareArticle(articleId, title, summary) {
            // Generate deep link: website_url + # + unique_article_id
            const uniqueLink = window.location.href.split('#')[0] + '#' + articleId;
            
            if (navigator.share) {
                // Uses the elegant native iOS/Android share sheet
                navigator.share({
                    title: 'VarthaBox News: ' + title,
                    text: 'Must read: ' + summary,
                    url: uniqueLink,
                })
                .then(() => console.log('Successful share'))
                .catch((error) => console.log('Error sharing', error));
            } else {
                // Fallback for laptops
                navigator.clipboard.writeText(uniqueLink);
                alert("Deep Link copied to clipboard! Paste it to WhatsApp.");
            }
        }

        // --- 5. FREE LIVE CRICKET WIDGET (Fetches Cricinfo RSS via a CORS proxy for free) ---
        async function fetchLiveScores() {
            const proxy = 'https://api.allorigins.win/get?url=';
            const cricinfoRSS = 'http://static.cricinfo.com/rss/livescores.xml';
            
            try {
                const response = await fetch(proxy + encodeURIComponent(cricinfoRSS));
                const data = await response.json();
                
                // Parse the XML data from the proxy
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const matches = xmlDoc.querySelectorAll("item");
                
                if (matches.length > 0) {
                    const firstMatch = matches[0].querySelector("title").textContent;
                    document.getElementById('cricket-score').innerText = "🏏 LIVE SCORE: " + firstMatch;
                } else {
                    document.getElementById('cricket-score').innerText = "🏏 No live matches being played right now.";
                }
            } catch (e) {
                console.log("Score fetch failed", e);
                document.getElementById('cricket-score').innerText = "🏏 Live scores temporarily unavailable.";
            }
        }

        // Initialize the premium experience
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                newsData = data;
                renderNews();
            });

        // Run the score fetcher immediately, and update every 60 seconds
        fetchLiveScores();
        setInterval(fetchLiveScores, 60000); 

    </script>
</body>
</html>
