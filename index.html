<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belagavi Pulse | Local News</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: auto; padding: 20px; background-color: #f4f4f9; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #222; font-size: 2.5em; margin-bottom: 10px;}
        .lang-btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; background-color: #e0e0e0; color: #333; border-radius: 25px; font-weight: bold; transition: 0.3s;}
        .lang-btn:hover { background-color: #d0d0d0; }
        .lang-btn.active { background-color: #ff4757; color: white; }
        .article { background: white; padding: 25px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .article h2 { color: #111; margin-top: 0; }
        .article p { line-height: 1.6; color: #555; font-size: 1.1em; }
        .read-more { display: inline-block; margin-top: 15px; color: #ff4757; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>
    <div class="header">
        <h1>Belagavi Pulse</h1>
        <p>Automated Local News Updates</p>
        <div>
            <button class="lang-btn active" onclick="setLanguage('en', this)">English</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div id="news-container">
        <p style="text-align:center;">Fetching latest news...</p>
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];

        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>News is currently being updated by our AI. Check back soon!</p>";
                return;
            }

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                const articleHTML = `
                    <div class="article">
                        <h2>${content.title}</h2>
                        <p>${content.content.replace(/\n/g, '<br><br>')}</p>
                        <a class="read-more" href="${article.link}" target="_blank">Read Original Source &rarr;</a>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                newsData = data;
                renderNews();
            })
            .catch(error => {
                document.getElementById('news-container').innerHTML = "<p style='text-align:center;'>Waiting for the first AI news generation...</p>";
                console.error('Error fetching news:', error);
            });
    </script>
</body>
</html>
