<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VarthaBox | Premium News</title>
    
    <meta property="og:title" content="VarthaBox | Real-Time News" />
    <meta property="og:description" content="Hyper-local, real-time updates in your language." />
    <meta property="og:image" content="https://badoza.github.io/VarthaBox/icon-512.png" />
    <meta property="og:url" content="https://badoza.github.io/VarthaBox/" />
    <meta property="og:type" content="website" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* PREMIUM MOBILE RESET */
        :root { --accent: #E63946; --bg: #000000; --surface: #0f0f0f; --text: #ffffff; --text-muted: #888888; }
        
        body, html { 
            margin: 0; padding: 0; 
            width: 100vw; 
            height: 100dvh; 
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; 
            overflow: hidden; -webkit-font-smoothing: antialiased;
        }

        /* 1. TOP HEADER */
        .top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 65px;
            padding: env(safe-area-inset-top, 10px) 15px 0 15px; 
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100; display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .brand-container { display: flex; flex-direction: column; justify-content: center; }
        .brand { font-size: 1.5em; font-weight: 900; letter-spacing: -0.5px; margin-bottom: -2px;}
        .brand span { color: var(--accent); }
        .dev-by { font-size: 0.65em; color: var(--text-muted); text-decoration: none; font-weight: 500; letter-spacing: 0.5px;}
        
        /* Language Selector */
        .lang-selector { display: flex; gap: 6px; }
        .lang-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05); 
            color: var(--text-muted); padding: 6px 12px; border-radius: 16px; 
            font-size: 0.75em; font-weight: 700; cursor: pointer; transition: 0.2s ease;
        }
        .lang-btn.active { background: #ffffff; color: #000000; }

        /* 2. SCORE TICKER */
        .score-ticker { 
            position: absolute; top: 65px; left: 0; width: 100%; height: 35px; line-height: 35px; 
            background: var(--surface); color: #ffb142; font-size: 0.8em; font-weight: 700; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            z-index: 90; text-align: center; box-sizing: border-box; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* 3. SWIPE CONTAINER */
        #news-container { 
            position: absolute; top: 100px; left: 0; width: 100%; 
            height: calc(100dvh - 100px); 
            overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; 
        }
        #news-container::-webkit-scrollbar { display: none; }
        
        /* 4. INDIVIDUAL ARTICLE CARD */
        .article { 
            height: 100%; width: 100%; scroll-snap-align: start; 
            display: flex; flex-direction: column; box-sizing: border-box;
        }
        
        .article-img { 
            width: 100%; height: 40%; 
            object-fit: cover; object-position: top center;
            border-bottom: 2px solid var(--accent); background: #111;
        }
        
        .content-box { 
            height: 60%; 
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0px)) 20px; 
            display: flex; flex-direction: column; 
            background: var(--bg); box-sizing: border-box;
        }
        
        .text-scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 5px; }
        .text-scroll-area::-webkit-scrollbar { width: 4px; }
        .text-scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .category-tag { color: var(--accent); font-size: 0.75em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}
        .date-tag { font-size: 0.75em; color: var(--text-muted); font-weight: 500; }
        
        .article h2 { margin: 0 0 10px 0; font-size: 1.45em; line-height: 1.35; font-weight: 800; color: var(--text);}
        .article p { margin: 0; font-size: 1.05em; line-height: 1.55; color: #cccccc; font-weight: 400;}
        
        /* 5. CLASSY BOTTOM BUTTONS */
        .action-row { 
            display: flex; gap: 12px; margin-top: 15px; 
            padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; 
        }
        .action-btn { 
            flex: 1; background: var(--surface); border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text); padding: 14px; border-radius: 14px; font-weight: 700; font-size: 0.9em; 
            display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer;
        }
        .action-btn.share { background: var(--accent); border: none; color: white; }
        
        .swipe-instruction { text-align: center; font-size: 0.75em; color: var(--text-muted); margin-top: 15px;}
        .swipe-instruction a { color: var(--accent); text-decoration: none; font-weight: 600;}

        .live-dot { display: inline-block; width: 6px; height: 6px; background: red; border-radius: 50%; margin-right: 6px; animation: pulse 1s infinite; vertical-align: middle;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-container">
            <div class="brand">Vartha<span>Box</span></div>
            <a href="https://www.instagram.com/kunal___dongare/" target="_blank" class="dev-by">by Kunal Dongare</a>
        </div>
        <div class="lang-selector">
            <button id="btn-en" class="lang-btn active" onclick="setLanguage('en')">EN</button>
            <button id="btn-kn" class="lang-btn" onclick="setLanguage('kn')">ಕನ್ನಡ</button>
            <button id="btn-mr" class="lang-btn" onclick="setLanguage('mr')">मराठी</button>
            <button id="btn-hi" class="lang-btn" onclick="setLanguage('hi')">हिंदी</button>
        </div>
    </div>
    
    <div class="score-ticker" id="live-score">
        <span class="live-dot"></span> Fetching Live Match...
    </div>
    
    <div id="news-container">
        <div style="height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;">
            <h2 style="font-weight: 500; color: #888;">Loading VarthaBox...</h2>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];
        const synth = window.speechSynthesis; 
        const langVoiceMap = { 'en': 'en-IN', 'kn': 'kn-IN', 'mr': 'mr-IN', 'hi': 'hi-IN' };

        // Handle Language Switching
        function setLanguage(lang) {
            currentLang = lang;
            // Update UI Buttons
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + lang).classList.add('active');
            synth.cancel();
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) return;

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                let displayDate = "Just Now";
                if (article.date) {
                    const d = new Date(article.date);
                    if (!isNaN(d.getTime())) {
                        displayDate = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    }
                }
                
                const articleHTML = `
                    <div class="article" id="${article.id}">
                        <img class="article-img" src="${article.image}" alt="News" onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&q=80'">
                        <div class="content-box">
                            <div class="text-scroll-area">
                                <div class="meta-row">
                                    <span class="category-tag">${article.category}</span>
                                    <span class="date-tag">${displayDate}</span>
                                </div>
                                <h2>${content.title}</h2>
                                <p>${content.content}</p>
                            </div>
                            <div>
                                <div class="action-row">
                                    <button class="action-btn" onclick="readAloud('${article.id}', \`${content.title}\`, \`${content.content}\`)">🔊 Listen</button>
                                    <button class="action-btn share" onclick="shareArticle('${article.id}', \`${content.title}\`, \`${content.content}\`)">🚀 Share</button>
                                </div>
                                <div class="swipe-instruction">
                                    Swipe up for next &nbsp;&bull;&nbsp; <a href="${article.link}" target="_blank">Read Full Source</a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        function readAloud(articleId, title, content) {
            synth.cancel(); 
            const utterance = new SpeechSynthesisUtterance(`${title}. ${content}`);
            utterance.lang = langVoiceMap[currentLang]; 
            utterance.rate = 0.95; 
            synth.speak(utterance);
        }

        function shareArticle(articleId, title, summary) {
            // FIX 1: Add the current language as a parameter BEFORE the hashtag
            const baseUrl = window.location.href.split('?')[0].split('#')[0];
            const uniqueLink = `${baseUrl}?lang=${currentLang}#${articleId}`;
            
            if (navigator.share) {
                navigator.share({ title: 'VarthaBox: ' + title, text: summary, url: uniqueLink }).catch(console.error);
            } else {
                navigator.clipboard.writeText(uniqueLink);
                alert("Link copied! Paste it in WhatsApp.");
            }
        }

        // INITIALIZATION ALGORITHM
        function initApp() {
            // FIX 2: Check URL for language parameter on load
            const urlParams = new URLSearchParams(window.location.search);
            const urlLang = urlParams.get('lang');
            if (urlLang && ['en', 'kn', 'mr', 'hi'].includes(urlLang)) {
                currentLang = urlLang;
                document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
                document.getElementById('btn-' + currentLang).classList.add('active');
            }

            const uniqueCacheBuster = new Date().getTime();
            fetch(`news.json?v=${uniqueCacheBuster}`)
                .then(response => response.json())
                .then(data => { 
                    newsData = data; 
                    renderNews(); 
                    
                    // FIX 3: Check URL for Article ID (Hash) and auto-scroll
                    const hash = window.location.hash;
                    if (hash) {
                        setTimeout(() => {
                            const targetElement = document.querySelector(hash);
                            if (targetElement) {
                                targetElement.scrollIntoView({ behavior: 'smooth' });
                            }
                        }, 500); // 0.5s delay ensures images have rendered before measuring scroll depth
                    }
                });
        }

        // Run Initialization
        initApp();

        async function fetchLiveScores() {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('http://static.cricinfo.com/rss/livescores.xml')}`;
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                if (items.length > 0) {
                    let matchText = items[0].querySelector("title").textContent;
                    
                    for(let i = 0; i < items.length; i++) {
                        let tempText = items[i].querySelector("title").textContent;
                        if(tempText.includes("RCB") || tempText.includes("CSK") || tempText.includes("MI") || tempText.includes("IPL")) {
                            matchText = tempText;
                            break; 
                        }
                    }

                    if (matchText.includes("RCB") || matchText.includes("CSK") || matchText.includes("MI") || matchText.includes("IPL")) {
                         document.getElementById('live-score').innerHTML = `<span class="live-dot"></span> LIVE IPL: ${matchText}`;
                    } else {
                         document.getElementById('live-score').innerText = "🏏 LIVE: " + matchText;
                    }
                }
            } catch (error) {}
        }
        
        fetchLiveScores();
        setInterval(fetchLiveScores, 15000); 
    </script>
</body>
</html>
