<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarthaBox | Short News</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow: hidden; color: white;}
        
        /* The swiping container */
        #news-container { height: calc(100vh - 110px); overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        
        /* Language Bar floating at top */
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px; background: #000; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid #333;}
        .brand { font-size: 1.5em; font-weight: 900; color: #ff3f34; letter-spacing: 1px;}
        .lang-selector { display: flex; gap: 5px; }
        .lang-btn { background: #222; border: none; color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8em; cursor: pointer;}
        .lang-btn.active { background: #ff3f34; font-weight: bold;}

        /* Live Score & Search Bar Styles */
        .score-ticker { background: #1a1a1a; color: #ffb142; padding: 8px 15px; font-size: 0.85em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid #333; margin-top: 61px; }
        .search-container { padding: 10px 15px; background: #111; display: flex; gap: 10px; border-bottom: 1px solid #333;}
        .search-input { flex-grow: 1; padding: 10px 15px; border-radius: 20px; border: none; background: #222; color: white; outline: none; font-size: 1em;}
        .search-btn { background: #0fb9b1; color: white; border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;}
        
        /* Local Search Results Styling */
        .local-results { background: #111; padding: 15px; }
        .local-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .local-item a { color: white; text-decoration: none; font-size: 1.1em; font-weight: bold;}
        .local-item p { color: #888; font-size: 0.85em; margin-top: 5px;}

        /* Individual News Card */
        .article { height: calc(100vh - 110px); width: 100vw; scroll-snap-align: start; display: flex; flex-direction: column; position: relative;}
        .article-img { width: 100%; height: 40vh; object-fit: cover; background: #222;}
        .content-box { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start; background: #111;}
        .category-tag { background: #ff3f34; color: white; display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.7em; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; width: max-content;}
        .article h2 { margin: 0 0 10px 0; font-size: 1.3em; line-height: 1.3; font-weight: 600; }
        .article p { margin: 0 0 15px 0; font-size: 1.05em; line-height: 1.5; color: #ccc; }
        .footer { margin-top: auto; padding-bottom: 20px; font-size: 0.8em; color: #888; }
        .footer a { color: #0fb9b1; text-decoration: none; font-weight: bold;}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">VarthaBox</div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div class="score-ticker" id="live-score">
        🏏 Loading live scores...
    </div>

    <div class="search-container">
        <input type="text" id="region-input" class="search-input" placeholder="Search city (e.g., Belagavi)">
        <button class="search-btn" onclick="fetchLocalNews()">Search</button>
    </div>
    
    <div id="news-container">
        <div style="height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;">
            <h2>Loading VarthaBox...</h2>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];

        // --- 1. LANGUAGE & SWIPE FEED LOGIC ---
        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) {
                container.innerHTML = "<div style='height: 100%; display: flex; justify-content: center; align-items: center; text-align:center; padding:20px;'><h2>AI is writing the latest updates.<br>Check back in a few minutes!</h2></div>";
                return;
            }

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                const articleHTML = `
                    <div class="article">
                        <img class="article-img" src="${article.image}" alt="News Image" onerror="this.src='https://images.unsplash.com/photo-1585829365295-ab7cd400c167?w=800&q=80'">
                        <div class="content-box">
                            <div class="category-tag">${article.category}</div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            <div class="footer">
                                Swipe up for next &bull; <a href="${article.link}" target="_blank">Read full story</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        // --- 2. DATA FETCHING (AI DATABASE) ---
        function loadMainDatabase() {
            fetch('news.json')
                .then(response => response.json())
                .then(data => {
                    newsData = data;
                    renderNews();
                })
                .catch(error => console.error('Error fetching news:', error));
        }

        // --- 3. LIVE CRICKET SCORE WIDGET ---
        async function fetchLiveScores() {
            const rssUrl = 'http://static.cricinfo.com/rss/livescores.xml';
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rssUrl)}`;
            
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                if (items.length > 0) {
                    const latestScore = items[0].querySelector("title").textContent;
                    document.getElementById('live-score').innerText = "🏏 " + latestScore;
                } else {
                    document.getElementById('live-score').innerText = "🏏 No live international matches right now.";
                }
            } catch (error) {
                console.error("Score fetch failed", error);
                document.getElementById('live-score').innerText = "🏏 Scores temporarily unavailable.";
            }
        }

        // --- 4. INSTANT LOCAL REGION SEARCH ---
        async function fetchLocalNews() {
            const region = document.getElementById('region-input').value;
            if (!region) return;

            const container = document.getElementById('news-container');
            container.innerHTML = `<div style="padding: 20px; text-align: center; color: #0fb9b1;"><h3>Searching live web for ${region} updates...</h3></div>`;

            const searchUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(region)}&hl=en-IN&gl=IN&ceid=IN:en`;
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = Array.from(xmlDoc.querySelectorAll("item")).slice(0, 8); // Top 8 results

                container.innerHTML = `<div style="padding: 15px; background:#222; color: #0fb9b1; font-weight: bold; position: sticky; top: 0;">Live Web Results for: ${region}</div>`;
                
                if (items.length === 0) {
                    container.innerHTML += `<div style="padding: 15px; color: white;">No recent news found for this area.</div>`;
                } else {
                    let htmlStr = '<div class="local-results">';
                    items.forEach(item => {
                        const title = item.querySelector("title").textContent;
                        const link = item.querySelector("link").textContent;
                        const pubDate = item.querySelector("pubDate").textContent;
                        const dateObj = new Date(pubDate);
                        const timeString = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                        htmlStr += `
                            <div class="local-item">
                                <a href="${link}" target="_blank">${title}</a>
                                <p>🕒 ${timeString} - Source: Google News</p>
                            </div>
                        `;
                    });
                    htmlStr += '</div>';
                    container.innerHTML += htmlStr;
                }
                
                // Button to return to the AI Swipe Feed
                container.innerHTML += `
                    <div style="text-align: center; padding: 20px 0 50px 0;">
                        <button class="search-btn" style="background: #ff3f34; width: 80%; padding: 15px;" onclick="renderNews()">Clear Search & Return to AI Feed</button>
                    </div>
                `;

            } catch (error) {
                console.error("Search failed", error);
                container.innerHTML = `<div style="padding: 20px; text-align: center; color: red;">Search failed. Please try again.</div>
                <div style="text-align: center;"><button class="search-btn" onclick="renderNews()">Return</button></div>`;
            }
        }

        // --- INITIALIZE APP ---
        loadMainDatabase();
        fetchLiveScores();
        setInterval(fetchLiveScores, 60000); // Update scores every minute

    </script>
</body>
</html>
