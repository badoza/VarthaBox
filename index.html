<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VarthaBox | Premium News</title>
    <style>
        /* MINIMALIST PREMIUM CSS */
        body, html { margin: 0; padding: 0; height: 100%; background-color: #050505; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Roboto, Helvetica, sans-serif; overflow: hidden; color: white;}
        
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        #news-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        
        /* Glassmorphism Header */
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; padding: 15px 20px; background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05);}
        .brand { font-size: 1.4em; font-weight: 800; color: #fff; letter-spacing: 0.5px;}
        .brand span { color: #ff3f34; }
        
        .lang-selector { display: flex; gap: 8px; }
        .lang-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.05); color: #aaa; padding: 6px 12px; border-radius: 20px; font-size: 0.75em; cursor: pointer; transition: 0.3s;}
        .lang-btn.active { background: #fff; color: #000; font-weight: bold;}

        /* Premium Article Card */
        .article { height: 100vh; width: 100vw; scroll-snap-align: start; display: flex; flex-direction: column; position: relative; padding-top: 60px; box-sizing: border-box;}
        
        .article-img-container { padding: 10px; height: 40vh; }
        .article-img { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
        
        .content-box { padding: 25px 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-start;}
        .category-tag { color: #ff3f34; font-size: 0.75em; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;}
        .article h2 { margin: 0 0 12px 0; font-size: 1.5em; line-height: 1.3; font-weight: 700; color: #fff;}
        .article p { margin: 0 0 20px 0; font-size: 1.1em; line-height: 1.6; color: #bbb; font-weight: 400;}
        
        /* Action Buttons (Voice & Share) */
        .action-row { display: flex; gap: 15px; margin-top: auto; padding-bottom: 30px;}
        .action-btn { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 15px; border-radius: 15px; font-weight: 600; font-size: 0.9em; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer;}
        .action-btn.share { background: #ff3f34; color: white;}
        .read-more { display: block; text-align: center; color: #888; font-size: 0.8em; margin-bottom: 20px; text-decoration: none;}

    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">Vartha<span>Box</span></div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div id="news-container">
        <div style="height: 100%; display: flex; justify-content: center; align-items: center; color: #555;">Loading premium feed...</div>
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];
        let synth = window.speechSynthesis; // The free AI voice engine!

        // Language Maps for the Voice AI
        const voiceLangMap = { 'en': 'en-IN', 'kn': 'kn-IN', 'mr': 'mr-IN', 'hi': 'hi-IN' };

        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            synth.cancel(); // Stop talking if language changes
            renderNews();
        }

        // --- 1. FREE AI VOICE READER ---
        function readAloud(title, content) {
            synth.cancel(); // Stop any current speech
            const textToRead = title + ". " + content;
            let utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = voiceLangMap[currentLang];
            utterance.rate = 0.95; // Slightly slower for better news reading
            synth.speak(utterance);
        }

        // --- 2. NATIVE WHATSAPP/INSTA SHARE & DEEP LINKING ---
        function shareArticle(id, title, text) {
            // Generate the deep link back to this specific article
            const deepLink = window.location.href.split('#')[0] + '#' + id;
            
            if (navigator.share) {
                navigator.share({
                    title: 'VarthaBox News: ' + title,
                    text: text,
                    url: deepLink
                }).catch(console.error);
            } else {
                // Fallback for laptops
                navigator.clipboard.writeText(deepLink);
                alert("Link copied! Paste it in WhatsApp to share.");
            }
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) return;

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                const articleHTML = `
                    <div class="article" id="${article.id}">
                        <div class="article-img-container">
                            <img class="article-img" src="${article.image}" alt="News Image" onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&q=80'">
                        </div>
                        <div class="content-box">
                            <div class="category-tag">${article.category}</div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            
                            <div class="action-row">
                                <button class="action-btn" onclick="readAloud(\`${content.title}\`, \`${content.content}\`)">
                                    🔊 Listen
                                </button>
                                <button class="action-btn share" onclick="shareArticle('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    🚀 Share
                                </button>
                            </div>
                            <a class="read-more" href="${article.link}" target="_blank">Read full story on source webiste</a>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });

            // --- 3. DEEP LINK SCROLLING MAGIC ---
            // If someone clicked a shared WhatsApp link with a #id, scroll to it instantly!
            const hashId = window.location.hash.substring(1);
            if (hashId) {
                setTimeout(() => {
                    const targetElement = document.getElementById(hashId);
                    if (targetElement) {
                        targetElement.scrollIntoView({ behavior: 'smooth' });
                    }
                }, 500); // Slight delay to let images load
            }
        }

        // Load data on startup
        fetch('news.json')
            .then(response => response.json())
            .then(data => {
                newsData = data;
                renderNews();
            });

    </script>
</body>
</html>
