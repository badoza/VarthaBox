<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VarthaBox | Premium News</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#9e0000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* PERFECT MOBILE CSS LOCK */
        body, html { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; /* Locked dimensions */
            background-color: #050505; 
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; 
            overflow: hidden; color: white;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Top Header */
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 65px; padding: 0 15px; background: rgba(158, 0, 0, 0.95); backdrop-filter: blur(10px); z-index: 100; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; box-shadow: 0 4px 15px rgba(0,0,0,0.5);}
        
        .brand-container { display: flex; flex-direction: column; justify-content: center;}
        .brand { font-size: 1.6em; font-weight: 900; color: white; letter-spacing: 1px; margin-bottom: -2px;}
        .dev-by { font-size: 0.65em; color: #ffcccc; text-decoration: none; font-weight: 600; letter-spacing: 0.5px;}
        
        .lang-selector { display: flex; gap: 6px; }
        .lang-btn { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8em; cursor: pointer; transition: 0.2s;}
        .lang-btn.active { background: white; color: #9e0000; font-weight: bold;}

        /* Free Cricket Ticker */
        .score-ticker { position: absolute; top: 65px; left: 0; width: 100%; height: 35px; line-height: 35px; background: #111; color: #ffb142; font-size: 0.85em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-bottom: 1px solid #333; z-index: 90; text-align: center; box-sizing: border-box;}

        /* The swiping container - strictly calculated height */
        #news-container { position: absolute; top: 100px; left: 0; width: 100%; height: calc(100vh - 100px); overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        
        /* Individual News Card */
        .article { height: 100%; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; position: relative; box-sizing: border-box;}
        
        .article-img { width: 100%; height: 40%; object-fit: cover; background: #222; border-bottom: 3px solid #9e0000;}
        
        .content-box { height: 60%; padding: 20px; display: flex; flex-direction: column; background: linear-gradient(to bottom, #151515, #000); box-sizing: border-box;}
        .category-tag { color: #ff4d4d; font-size: 0.75em; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;}
        .article h2 { margin: 0 0 10px 0; font-size: 1.35em; line-height: 1.3; font-weight: 700;}
        .article p { margin: 0; font-size: 1.05em; line-height: 1.5; color: #d1d1d1; flex-grow: 1; overflow-y: auto;}
        
        /* Actions & Footer */
        .action-row { display: flex; gap: 12px; margin-top: 15px;}
        .action-btn { flex: 1; background: #222; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 0.9em; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .action-btn.share { background: #9e0000; border: none;}
        
        .signature { text-align: center; font-size: 0.85em; color: #888; margin-top: 15px;}
        .signature a { color: #ff4d4d; text-decoration: none; font-weight: bold;}
        .swipe-instruction { text-align: center; font-size: 0.75em; color: #666; margin-top: 10px; padding-bottom: 25px;}
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand-container">
            <div class="brand">VarthaBox</div>
            <a href="https://www.instagram.com/kunal___dongare/" target="_blank" class="dev-by">by Kunal Dongare</a>
        </div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div class="score-ticker" id="live-score">
        🏏 LIVE MATCHES: Fetching latest score...
    </div>
    
    <div id="news-container">
        <div style="height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;">
            <h2>Updating Real-Time News...<br>Check back in a minute!</h2>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        let newsData = [];
        const synth = window.speechSynthesis; 
        const langVoiceMap = { 'en': 'en-IN', 'kn': 'kn-IN', 'mr': 'mr-IN', 'hi': 'hi-IN' };

        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            synth.cancel();
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) return;

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                const articleHTML = `
                    <div class="article" id="${article.id}">
                        <img class="article-img" src="${article.image}" alt="News Image" onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&q=80'">
                        <div class="content-box">
                            <div class="category-tag">${article.category}</div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            
                            <div class="action-row">
                                <button class="action-btn" onclick="readAloud('${article.id}', \`${content.title}\`, \`${content.content}\`)">🔊 Listen</button>
                                <button class="action-btn share" onclick="shareArticle('${article.id}', \`${content.title}\`, \`${content.content}\`)">🚀 Share</button>
                            </div>

                            <div class="signature">
                                Developed by <a href="https://www.instagram.com/kunal___dongare/" target="_blank">Kunal Dongare</a>
                            </div>
                            <div class="swipe-instruction">
                                Swipe up for next &bull; <a href="${article.link}" target="_blank" style="color:#666;">Original</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        function readAloud(articleId, title, content) {
            synth.cancel(); 
            const utterance = new SpeechSynthesisUtterance(`${title}. ${content}`);
            utterance.lang = langVoiceMap[currentLang]; 
            utterance.rate = 0.95; 
            synth.speak(utterance);
        }

        function shareArticle(articleId, title, summary) {
            const uniqueLink = window.location.href.split('#')[0] + '#' + articleId;
            if (navigator.share) {
                navigator.share({ title: 'VarthaBox: ' + title, text: summary, url: uniqueLink }).catch(console.error);
            } else {
                navigator.clipboard.writeText(uniqueLink);
                alert("Link copied!");
            }
        }

        fetch('news.json')
            .then(response => response.json())
            .then(data => { newsData = data; renderNews(); });

        async function fetchLiveScores() {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('http://static.cricinfo.com/rss/livescores.xml')}`;
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                if (items.length > 0) {
                    document.getElementById('live-score').innerText = "🏏 " + items[0].querySelector("title").textContent;
                }
            } catch (error) {}
        }
        fetchLiveScores();
        setInterval(fetchLiveScores, 60000); 
    </script>
</body>
</html>
