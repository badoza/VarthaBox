<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VarthaBox | Premium News</title>
    
    <meta property="og:title" content="VarthaBox | Short News App" />
    <meta property="og:description" content="Read real-time, hyper-local news in multiple languages." />
    <meta property="og:image" content="https://badoza.github.io/VarthaBox/icon-512.png" />
    <meta property="og:url" content="https://badoza.github.io/VarthaBox/" />
    <meta property="og:type" content="website" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* BASE PREMIUM RESET */
        body, html { 
            margin: 0; padding: 0; 
            width: 100vw; height: 100vh; 
            background-color: #050505; 
            background-image: radial-gradient(circle at 50% 0%, #1a0000 0%, #000000 70%);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif; 
            overflow: hidden; color: white;
            -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center;
        }

        /* DESKTOP DEVICE EMULATOR (Sleek Frame) */
        #app-wrapper {
            position: relative; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
        }
        @media (min-width: 768px) {
            #app-wrapper {
                width: 400px; height: 850px; max-height: 90vh;
                border-radius: 40px;
                border: 10px solid #1a1a1a;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 2px #333;
            }
        }
        
        /* TOP HEADER - Frosted Glass */
        .top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; padding: env(safe-area-inset-top, 20px) 20px 15px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            z-index: 100; display: flex; justify-content: space-between; align-items: flex-start; box-sizing: border-box;
            pointer-events: none; /* Lets clicks pass through the invisible gradient part */
        }
        
        .brand-container { display: flex; flex-direction: column; justify-content: center; pointer-events: auto;}
        .brand { font-size: 1.8em; font-weight: 900; color: white; letter-spacing: -0.5px; margin-bottom: 2px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .brand span { color: #ff3333; }
        .dev-by { font-size: 0.7em; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;}
        
        /* LANGUAGE SELECTOR - Sleek Pills */
        .lang-selector { display: flex; gap: 8px; pointer-events: auto;}
        .lang-btn { 
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 14px; border-radius: 30px; 
            font-size: 0.75em; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .lang-btn:active { transform: scale(0.9); }
        .lang-btn.active { background: #ff3333; border-color: #ff3333; color: white; box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4);}

        /* FLOATING LIVE SCORE PILL */
        .score-ticker-container {
            position: absolute; top: calc(env(safe-area-inset-top, 20px) + 65px); width: 100%;
            display: flex; justify-content: center; z-index: 90; pointer-events: none;
        }
        .score-ticker { 
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 177, 66, 0.3); color: #ffb142; 
            font-size: 0.8em; font-weight: 700; padding: 8px 20px; border-radius: 30px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 85%;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); pointer-events: auto;
        }

        /* FULL-SCREEN SWIPER */
        #news-container { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; 
        }
        #news-container::-webkit-scrollbar { display: none; } /* Hide scrollbar for clean look */
        
        /* THE IMMERSIVE ARTICLE CARD */
        .article { height: 100%; width: 100%; scroll-snap-align: start; position: relative; }
        
        /* Full Bleed Background Image */
        .article-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;}
        
        /* Cinematic Gradient Fade (Darkens the bottom so text is readable) */
        .gradient-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.3) 40%, rgba(0,0,0,0.9) 80%, #000000 100%);
        }
        
        /* CONTENT POSITIONED AT BOTTOM */
        .content-box { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 10px)); 
            z-index: 3; display: flex; flex-direction: column; box-sizing: border-box;
        }
        
        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .category-tag { background: #ff3333; color: white; font-size: 0.7em; font-weight: 800; padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 2px 10px rgba(255, 51, 51, 0.3);}
        .date-tag { font-size: 0.75em; color: rgba(255,255,255,0.6); font-weight: 500; }
        
        .article h2 { margin: 0 0 12px 0; font-size: 1.55em; line-height: 1.3; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
        .article p { margin: 0; font-size: 1.05em; line-height: 1.55; color: rgba(255,255,255,0.9); text-shadow: 0 1px 5px rgba(0,0,0,0.8);}
        
        /* CREATIVE PILL BUTTONS */
        .action-row { display: flex; gap: 12px; margin-top: 20px;}
        .action-btn { 
            flex: 1; padding: 14px; border-radius: 20px; font-weight: 700; font-size: 0.9em; 
            display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer;
            transition: transform 0.2s ease;
        }
        .action-btn:active { transform: scale(0.95); }
        .action-btn.glass { 
            background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2); color: white;
        }
        .action-btn.share { 
            background: linear-gradient(135deg, #ff4d4d, #9e0000); border: none; color: white;
            box-shadow: 0 4px 15px rgba(158, 0, 0, 0.5);
        }
        
        .swipe-instruction { text-align: center; font-size: 0.75em; color: rgba(255,255,255,0.5); margin-top: 15px;}
        .swipe-instruction a { color: #ff3333; text-decoration: none; font-weight: bold;}

        /* RED LIVE DOT ANIMATION */
        @keyframes livePulse {
            0% { opacity: 1; text-shadow: 0 0 5px red;}
            50% { opacity: 0.4; text-shadow: none;}
            100% { opacity: 1; text-shadow: 0 0 5px red;}
        }
        .live-indicator { animation: livePulse 1.5s infinite; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div class="top-bar">
        <div class="brand-container">
            <div class="brand">Vartha<span>Box</span></div>
            <a href="https://www.instagram.com/kunal___dongare/" target="_blank" class="dev-by">by Kunal Dongare</a>
        </div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">ಕನ್ನಡ</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">मराठी</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">हिंदी</button>
        </div>
    </div>
    
    <div class="score-ticker-container">
        <div class="score-ticker" id="live-score">
            🏏 Fetching Live IPL Score...
        </div>
    </div>
    
    <div id="news-container">
        <div style="height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; background: #050505; z-index: 10;">
            <h2>Curating Premium News...<br><span style="font-size: 0.6em; color: #888; font-weight: normal;">Please wait a moment</span></h2>
        </div>
    </div>
</div>

    <script>
        let currentLang = 'en';
        let newsData = [];
        const synth = window.speechSynthesis; 
        const langVoiceMap = { 'en': 'en-IN', 'kn': 'kn-IN', 'mr': 'mr-IN', 'hi': 'hi-IN' };

        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            synth.cancel();
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) return;

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                let displayDate = "Just Now";
                if (article.date) {
                    const d = new Date(article.date);
                    if (!isNaN(d.getTime())) {
                        displayDate = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    }
                }
                
                // PREMIUM IMMERSIVE CARD HTML
                const articleHTML = `
                    <div class="article" id="${article.id}">
                        <img class="article-img" src="${article.image}" alt="News" onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&q=80'">
                        <div class="gradient-overlay"></div>
                        
                        <div class="content-box">
                            <div class="meta-row">
                                <span class="category-tag">${article.category}</span>
                                <span class="date-tag">${displayDate}</span>
                            </div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            
                            <div class="action-row">
                                <button class="action-btn glass" onclick="readAloud('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    <span style="font-size: 1.2em;">🔊</span> Listen
                                </button>
                                <button class="action-btn share" onclick="shareArticle('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    <span style="font-size: 1.2em;">🚀</span> Share
                                </button>
                            </div>

                            <div class="swipe-instruction">
                                Swipe up for next story &bull; <a href="${article.link}" target="_blank">View Original Source</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        function readAloud(articleId, title, content) {
            synth.cancel(); 
            const utterance = new SpeechSynthesisUtterance(`${title}. ${content}`);
            utterance.lang = langVoiceMap[currentLang]; 
            utterance.rate = 0.95; 
            synth.speak(utterance);
        }

        function shareArticle(articleId, title, summary) {
            const uniqueLink = window.location.href.split('#')[0] + '#' + articleId;
            if (navigator.share) {
                navigator.share({ title: 'VarthaBox: ' + title, text: summary, url: uniqueLink }).catch(console.error);
            } else {
                navigator.clipboard.writeText(uniqueLink);
                alert("Link copied! Paste it in WhatsApp.");
            }
        }

        // Cache Buster
        const uniqueCacheBuster = new Date().getTime();
        fetch(`news.json?v=${uniqueCacheBuster}`)
            .then(response => response.json())
            .then(data => { newsData = data; renderNews(); });

        // SUPER-POLLING IPL LIVE WIDGET (15 Seconds)
        async function fetchLiveScores() {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('http://static.cricinfo.com/rss/livescores.xml')}`;
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                if (items.length > 0) {
                    let matchText = items[0].querySelector("title").textContent;
                    
                    for(let i = 0; i < items.length; i++) {
                        let tempText = items[i].querySelector("title").textContent;
                        if(tempText.includes("RCB") || tempText.includes("CSK") || tempText.includes("MI") || tempText.includes("IPL")) {
                            matchText = tempText;
                            break; 
                        }
                    }

                    if (matchText.includes("RCB") || matchText.includes("CSK") || matchText.includes("MI") || matchText.includes("IPL")) {
                         document.getElementById('live-score').innerHTML = `<span class="live-indicator">🔴 LIVE IPL:</span> ${matchText}`;
                    } else {
                         document.getElementById('live-score').innerText = "🏏 " + matchText;
                    }
                }
            } catch (error) {}
        }
        
        fetchLiveScores();
        setInterval(fetchLiveScores, 15000); 
    </script>
</body>
</html>
