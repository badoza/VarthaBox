name: Daily Auto News Publisher

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # UPDATED to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # UPDATED to v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests feedparser google-generativeai

      - name: Run Auto Journalist Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python auto_journalist.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add news.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-updated news.json"
          git push
