<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VarthaBox | Real-Time News</title>
    
    <meta property="og:title" content="VarthaBox | Premium News" />
    <meta property="og:description" content="Hyper-local, real-time updates in your language." />
    <meta property="og:image" content="https://badoza.github.io/VarthaBox/icon-512.png" />
    <meta property="og:url" content="https://badoza.github.io/VarthaBox/" />
    <meta property="og:type" content="website" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        /* BASE MINIMALIST RESET */
        :root { --accent: #E63946; --bg: #030303; --surface: #121212; --text: #F8F9FA; --text-muted: #8E8E93; }
        
        body, html { 
            margin: 0; padding: 0; width: 100vw; height: 100vh; 
            background-color: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; 
            overflow: hidden; -webkit-font-smoothing: antialiased;
            display: flex; justify-content: center; align-items: center;
        }

        /* DESKTOP EMULATOR (Sleek Phone Frame on PC) */
        #app-wrapper {
            position: relative; width: 100%; height: 100%;
            background-color: var(--bg); overflow: hidden;
        }
        @media (min-width: 768px) {
            #app-wrapper {
                width: 414px; height: 896px; max-height: 92vh;
                border-radius: 40px; border: 8px solid #222;
                box-shadow: 0 30px 60px rgba(0,0,0,0.8), 0 0 0 1px #333;
            }
        }
        
        /* 1. THE SMART HEADER (Fixes Overlap) */
        .top-bar { 
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            padding: env(safe-area-inset-top, 15px) 20px 10px; 
            background: rgba(3, 3, 3, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100; display: flex; justify-content: space-between; align-items: center; 
            box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .brand { font-size: 1.5em; font-weight: 800; letter-spacing: -0.5px; flex-shrink: 0;}
        .brand span { color: var(--accent); }
        
        /* Minimalist Pill Language Selector */
        .lang-selector { 
            display: flex; gap: 4px; background: rgba(255,255,255,0.05); 
            padding: 4px; border-radius: 20px; flex-shrink: 1; overflow-x: auto;
        }
        .lang-btn { 
            background: transparent; border: none; color: var(--text-muted); 
            padding: 6px 12px; border-radius: 16px; font-size: 0.75em; font-weight: 700; 
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase;
        }
        .lang-btn.active { background: var(--text); color: var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

        /* SLEEK SCORE TICKER */
        .score-ticker { 
            position: absolute; top: 70px; left: 0; width: 100%; height: 32px; line-height: 32px; 
            background: var(--accent); color: white; font-size: 0.75em; font-weight: 700; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            z-index: 90; text-align: center; box-sizing: border-box; letter-spacing: 0.5px;
        }

        /* SWIPE CONTAINER */
        #news-container { 
            position: absolute; top: 102px; left: 0; width: 100%; height: calc(100% - 102px); 
            overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; 
        }
        #news-container::-webkit-scrollbar { display: none; }
        
        .article { height: 100%; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; position: relative; box-sizing: border-box;}
        
        /* 2. THE PERFECT IMAGE FIX (Cinematic Blur Container) */
        .article-visual {
            position: relative; width: 100%; height: 42vh; overflow: hidden;
            background: #000; flex-shrink: 0;
        }
        .blur-bg {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            filter: blur(25px); opacity: 0.4; transform: scale(1.1);
        }
        .clear-img {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; /* PERFECT FIT - NO CROPPING */
            z-index: 2;
        }
        
        /* EDITORIAL CONTENT AREA */
        .content-box { 
            flex-grow: 1; padding: 25px 20px calc(20px + env(safe-area-inset-bottom, 10px)); 
            display: flex; flex-direction: column; background: var(--bg); box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .category-tag { color: var(--accent); font-size: 0.7em; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;}
        .date-tag { font-size: 0.7em; color: var(--text-muted); font-weight: 500; }
        
        .article h2 { margin: 0 0 12px 0; font-size: 1.45em; line-height: 1.35; font-weight: 700; color: var(--text);}
        .article p { margin: 0; font-size: 1.05em; line-height: 1.6; color: rgba(255,255,255,0.85); flex-grow: 1; font-weight: 400;}
        
        /* MINIMALIST ICON BUTTONS */
        .action-row { display: flex; gap: 15px; margin-top: 15px;}
        .action-btn { 
            flex: 1; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); 
            color: var(--text); padding: 14px; border-radius: 16px; font-weight: 600; font-size: 0.85em; 
            display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .action-btn:active { transform: scale(0.96); background: #222;}
        .action-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .action-btn.share { background: var(--text); color: var(--bg); border: none;}
        .action-btn.share svg { fill: var(--bg); }
        
        .swipe-instruction { text-align: center; font-size: 0.75em; color: var(--text-muted); margin-top: 25px;}
        .swipe-instruction a { color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 2px;}

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .live-dot { display: inline-block; width: 6px; height: 6px; background: white; border-radius: 50%; margin-right: 6px; animation: pulse 1s infinite; vertical-align: middle;}
    </style>
</head>
<body>

<div id="app-wrapper">
    <div class="top-bar">
        <div class="brand">Vartha<span>.</span></div>
        <div class="lang-selector">
            <button class="lang-btn active" onclick="setLanguage('en', this)">EN</button>
            <button class="lang-btn" onclick="setLanguage('kn', this)">KN</button>
            <button class="lang-btn" onclick="setLanguage('mr', this)">MR</button>
            <button class="lang-btn" onclick="setLanguage('hi', this)">HI</button>
        </div>
    </div>
    
    <div class="score-ticker" id="live-score">
        <span class="live-dot"></span> Fetching Live Match...
    </div>
    
    <div id="news-container">
        <div style="height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px;">
            <h2 style="font-weight: 400; color: #888;">Curating News...</h2>
        </div>
    </div>
</div>

    <script>
        let currentLang = 'en';
        let newsData = [];
        const synth = window.speechSynthesis; 
        const langVoiceMap = { 'en': 'en-IN', 'kn': 'kn-IN', 'mr': 'mr-IN', 'hi': 'hi-IN' };

        // Play Icon SVG
        const iconPlay = `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
        // Share Icon SVG
        const iconShare = `<svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>`;

        function setLanguage(lang, buttonElement) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            synth.cancel();
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            
            if (newsData.length === 0) return;

            newsData.forEach(article => {
                const content = article.translations[currentLang];
                if (!content) return; 
                
                let displayDate = "Just Now";
                if (article.date) {
                    const d = new Date(article.date);
                    if (!isNaN(d.getTime())) {
                        displayDate = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    }
                }
                
                const articleHTML = `
                    <div class="article" id="${article.id}">
                        
                        <div class="article-visual">
                            <div class="blur-bg" style="background-image: url('${article.image}')"></div>
                            <img class="clear-img" src="${article.image}" alt="News" onerror="this.src='https://images.unsplash.com/photo-1495020689067-958852a7765e?w=800&q=80'">
                        </div>
                        
                        <div class="content-box">
                            <div class="meta-row">
                                <span class="category-tag">${article.category}</span>
                                <span class="date-tag">${displayDate}</span>
                            </div>
                            <h2>${content.title}</h2>
                            <p>${content.content}</p>
                            
                            <div class="action-row">
                                <button class="action-btn" onclick="readAloud('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    ${iconPlay} Listen
                                </button>
                                <button class="action-btn share" onclick="shareArticle('${article.id}', \`${content.title}\`, \`${content.content}\`)">
                                    ${iconShare} Share
                                </button>
                            </div>

                            <div class="swipe-instruction">
                                Swipe for next &nbsp;&bull;&nbsp; <a href="${article.link}" target="_blank">View Source</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += articleHTML;
            });
        }

        function readAloud(articleId, title, content) {
            synth.cancel(); 
            const utterance = new SpeechSynthesisUtterance(`${title}. ${content}`);
            utterance.lang = langVoiceMap[currentLang]; 
            utterance.rate = 0.95; 
            synth.speak(utterance);
        }

        function shareArticle(articleId, title, summary) {
            const uniqueLink = window.location.href.split('#')[0] + '#' + articleId;
            if (navigator.share) {
                navigator.share({ title: 'VarthaBox: ' + title, text: summary, url: uniqueLink }).catch(console.error);
            } else {
                navigator.clipboard.writeText(uniqueLink);
                alert("Link copied! Paste it in WhatsApp.");
            }
        }

        const uniqueCacheBuster = new Date().getTime();
        fetch(`news.json?v=${uniqueCacheBuster}`)
            .then(response => response.json())
            .then(data => { newsData = data; renderNews(); });

        async function fetchLiveScores() {
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('http://static.cricinfo.com/rss/livescores.xml')}`;
            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data.contents, "text/xml");
                const items = xmlDoc.querySelectorAll("item");
                
                if (items.length > 0) {
                    let matchText = items[0].querySelector("title").textContent;
                    
                    for(let i = 0; i < items.length; i++) {
                        let tempText = items[i].querySelector("title").textContent;
                        if(tempText.includes("RCB") || tempText.includes("CSK") || tempText.includes("MI") || tempText.includes("IPL")) {
                            matchText = tempText;
                            break; 
                        }
                    }

                    if (matchText.includes("RCB") || matchText.includes("CSK") || matchText.includes("MI") || matchText.includes("IPL")) {
                         document.getElementById('live-score').innerHTML = `<span class="live-dot"></span> LIVE IPL: ${matchText}`;
                    } else {
                         document.getElementById('live-score').innerText = "🏏 LIVE: " + matchText;
                    }
                }
            } catch (error) {}
        }
        
        fetchLiveScores();
        setInterval(fetchLiveScores, 15000); 
    </script>
</body>
</html>
